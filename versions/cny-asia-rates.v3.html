<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Studio - 云端开发，化繁为简</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background-color: #F0F4FA;
      font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .title {
      color: var(--BlueGray-BlueGray10, #455267);
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      line-height: 26px;
      margin: 0 0 8px;
    }
    .subtitle {
      color: var(--BlueGray-BlueGray10, #455267);
      text-align: center;
      font-size: 14px;
      font-weight: 400;
      line-height: 22px;
      margin: 0 0 20px;
      max-width: 360px;
      padding: 0 16px;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }
    .button {
      padding: 6px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      font-size: 14px;
      line-height: 22px;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .button-primary {
      background-color: #1F67FE;
      color: white;
    }
    .button-primary:hover {
      background-color: #3f7cff;
    }
    .button-primary:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    .button-secondary {
      background-color: transparent;
      color: #455267;
      border: 1px solid #C1CEDE;
    }
    .button-secondary:hover {
      background-color: #E5ECF5;
    }
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .details {
      margin-top: 28px;
      font-size: 12px;
      color: #8A95A7;
      text-align: center;
      max-width: 480px;
      padding: 0 16px;
    }
    .details summary {
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: inline-block;
      color: #8A95A7;
    }
    .details summary::-webkit-details-marker {
      display: none;
    }
    .details summary:hover {
      color: #455267;
    }
    .details[open] summary {
      margin-bottom: 8px;
    }
    .details-body {
      font-family: "SF Mono", Menlo, Consolas, monospace;
      color: #8A95A7;
      word-break: break-all;
      line-height: 18px;
    }
    .details-body div {
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <svg width="220" height="140" viewBox="0 0 220 140" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  </svg>

  <h1 id="error-title" class="title">工作空间当前未在运行</h1>
  <p id="error-subtitle" class="subtitle">数据已保留，可点击下方按钮重新启动以继续工作。</p>

  <div class="actions">
    <button class="button button-primary" onclick="reloadPage()">立即启动</button>
    <button class="button button-secondary" onclick="goDashboard()">返回 Dashboard</button>
  </div>

  <details class="details">
    <summary>技术详情</summary>
    <div class="details-body">
      <div>错误码：<span id="error-code">12806</span></div>
      <div>错误信息：<span id="error-message">工作空间没有找到</span></div>
      <div>SandboxId：<span id="sandbox-id"></span></div>
      <div>TraceId：<span id="trace-id">68d3b201ca4e5c43b5fc2438ffce5da1</span></div>
    </div>
  </details>

  <script>
    var code = "12806";
    var message = "工作空间没有找到";
    var traceId = "68d3b201ca4e5c43b5fc2438ffce5da1";

    
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        type: 'cloudStudioError',
        code: code || 'Unknown',
        traceId: traceId || '',
        messages: message || '工作空间当前未在运行',
      }, '*');
    }

    function reloadPage() {
      var button = document.querySelector('.button-primary');
      button.disabled = true;
      button.innerHTML = '<span class="loading"></span>启动中';

      var currentUrl = window.location.href;
      var newUrl = currentUrl;
      if (!currentUrl.includes('restart=true')) {
        newUrl = currentUrl.includes('?') ? currentUrl + '&restart=true' : currentUrl + '?restart=true';
      }
      window.location.href = newUrl;
    }

    function goDashboard() {
      
      
      try {
        if (window.top && window.top !== window.self) {
          window.top.location.href = '/dashboard';
          return;
        }
      } catch (e) {
        
      }
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
